<!DOCTYPE html>
<html lang="en">
<head>
    <title>ByteBloom</title>
    <menta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="responsive.css">
    <style>
        nav{
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #1e4d8f;
            padding: 15px;  
            border:3px solid  white;
            box-shadow: 0px 0px 15px black;
            margin: 0;
        }
        h1{
            color: rgb(255, 255, 255);
            font-size: 40px;
            padding: 15px 30px;
        }   
       .search-btn{
            background-color: #0a0a0a;
            color: white;
            border: none;
          width: 120px;
          height: 45px;
          border-radius: 25px;
        }
       .login-btn{
            background-color: #0a0a0a;
            color: white;
            border: none;
          width: 120px;
          height: 45px;
          border-radius: 25px;
        }
        .bbh{
            width: 100%;
            height: 70vh;
            object-fit: cover;
            display: block;
        }
        .hero::before{
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }
        .hero{
            position: relative;
        }
        .hero-text{
            position: absolute;
            top: 20%;
            left: 20%;
            padding-left: 20%;
            
            transform: translate(-50%);
            color: white;
            max-width: 600px;
        }
        .hero-text h2{
         font-size: 70px;
         margin-bottom: 20px;
         text-shadow: 2px 2px 10px black;
        }
        .hero-text p{
            font-size: 25px;
            text-shadow: 2px 2px 10px black;
        }





    </style>


</head>




<body>
    
<nav>
  
  
 <h1> ByteBloom</h1>
<button class="search-btn" onclick="window.location.href='search.html'"> Search</button> 
<button class="login-btn"> Upload</button>
</nav>
<div class = "hero">
<img src="images/wp2466001.jpg" class="bbh" >
<div class="hero-text">
        <h2> Find.Share.Grow. </h2>
    <p> A place where software engineers Students share resources ,notes , and helpful links </p>
</div>
</div>
</body>
</html>
